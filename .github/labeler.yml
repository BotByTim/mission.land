      - any-glob-to-any-file: "missions/3-*/**"
  - head-branch: ["^mission-3/"]
mission-4:
  - changed-files:
      - any-glob-to-any-file: "missions/4-*/**"
  - head-branch: ["^mission-4/"]
mission-5:
