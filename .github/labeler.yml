# Auto-applies a `mission-<id>` label to every PR (including draft attempts and
# fork PRs) that touches a mission's folder or uses a `mission-<id>/…` branch.
# The label is what the site links to ("see all attempts") and what we count by,
# so it must be applied by automation — fork contributors have no label
# permission. See .github/workflows/label-missions.yml.
mission-0:
  - changed-files:
      - any-glob-to-any-file: "missions/0-*/**"
  - head-branch: ["^mission-0/"]
mission-1:
  - changed-files:
      - any-glob-to-any-file: "missions/1-*/**"
  - head-branch: ["^mission-1/"]
mission-2:
  - changed-files:
      - any-glob-to-any-file: "missions/2-*/**"
  - head-branch: ["^mission-2/"]
