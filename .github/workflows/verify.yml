name: verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    # Skip draft PRs — they're attempt logs, not submissions to verify (see
    # skill.md). Pushes to main always run.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify all records
        run: python3 tools/verify_all.py
